syntax = "proto3";

package shadnet;

option optimize_for = LITE_RUNTIME;

// Account

message LoginRequest {
    string npid     = 1;
    string password = 2;
    string token    = 3;  
}

message FriendEntry {
    string npid     = 1;
    bool   online   = 2;
    bytes  presence = 3;
}

message LoginReply {
    string               avatar_url               = 1;
    uint64               user_id                  = 2;
    repeated FriendEntry friends                  = 3;
    repeated string      friend_requests_sent     = 4;
    repeated string      friend_requests_received = 5;
    repeated string      blocked                  = 6;
}

message GetTokenReply {
    string token   = 1;
    uint64 user_id = 2;
    string npid    = 3;
}

message RegistrationRequest {
    string npid       = 1;
    string password   = 2;
    string avatar_url = 3;  // optional; server uses default if empty
    string email      = 4;
    string secret_key = 5;  // optional; must match server config if set
}

// Friend / block commands
// Shared by AddFriend, RemoveFriend, AddBlock, RemoveBlock.

message FriendCommandRequest {
    string npid = 1;  // target Online ID
}

// Notifications

// NotificationType::FriendQuery (5)
message NotifyFriendQuery {
    string from_npid = 1;
}

// NotificationType::FriendNew (6)
message NotifyFriendNew {
    string npid   = 1;
    bool   online = 2;
}

// NotificationType::FriendLost (7)
message NotifyFriendLost {
    string npid = 1;
}

// NotificationType::FriendStatus (8)
message NotifyFriendStatus {
    string npid      = 1;
    bool   online    = 2;
    uint64 timestamp = 3;  // nanoseconds since Unix epoch
}

// Score: board configuration

message BoardInfo {
    uint32 rankLimit       = 1;
    uint32 updateMode      = 2;   // 0=NORMAL_UPDATE, 1=FORCE_UPDATE
    uint32 sortMode        = 3;   // 0=DESCENDING, 1=ASCENDING
    uint32 uploadNumLimit  = 4;
    uint64 uploadSizeLimit = 5;
}

// Score: requests

message RecordScoreRequest {
    uint32 boardId  = 1;
    int32  pcId     = 2;
    int64  score    = 3;
    string comment  = 4;
    bytes  data     = 5;   // optional inline game-info blob
}

message RecordScoreGameDataRequest {
    uint32 boardId = 1;
    int32  pcId    = 2;
    int64  score   = 3;
}

message GetScoreGameDataRequest {
    uint32 boardId = 1;
    string npId    = 2;
    int32  pcId    = 3;
}

message GetScoreRangeRequest {
    uint32 boardId      = 1;
    uint32 startRank    = 2;
    uint32 numRanks     = 3;
    bool   withComment  = 4;
    bool   withGameInfo = 5;
}

message ScoreNpIdPcId {
    string npid = 1;
    int32  pcId = 2;
}

message GetScoreNpIdRequest {
    uint32                  boardId      = 1;
    repeated ScoreNpIdPcId  npids        = 2;
    bool                    withComment  = 3;
    bool                    withGameInfo = 4;
}

message GetScoreFriendsRequest {
    uint32 boardId      = 1;
    bool   includeSelf  = 2;
    uint32 max          = 3;
    bool   withComment  = 4;
    bool   withGameInfo = 5;
}

message ScoreAccountIdPcId {
    int64 accountId = 1;
    int32 pcId      = 2;
}

message GetScoreAccountIdRequest {
    uint32                       boardId      = 1;
    repeated ScoreAccountIdPcId  ids          = 2;
    bool                         withComment  = 3;
    bool                         withGameInfo = 4;
}

message GetScoreGameDataByAccountIdRequest {
    uint32 boardId   = 1;
    int64  accountId = 2;
    int32  pcId      = 3;
}

// Score: responses

message ScoreRankData {
    string npId        = 1;
    int32  pcId        = 2;
    uint32 rank        = 3;
    int64  score       = 4;
    bool   hasGameData = 5;
    uint64 recordDate  = 6;
    int64  accountId   = 7;
}

message ScoreInfo {
    bytes data = 1;
}

message GetScoreResponse {
    repeated ScoreRankData rankArray    = 1;
    repeated string        commentArray = 2;
    repeated ScoreInfo     infoArray    = 3;
    uint64                 lastSortDate = 4;
    uint32                 totalRecord  = 5;
}

// ── Matching ──────────────────────────────────────────────────────────────────

// Shared attribute types

message MatchingBinAttr {
    uint32 attr_id = 1;
    bytes  data    = 2;
}

message MatchingIntAttr {
    uint32 attr_id    = 1;
    uint32 attr_value = 2;
}

message MatchingRoomGroup {
    uint32 group_id    = 1;
    bool   has_passwd  = 2;
    bool   has_label   = 3;
    bytes  label       = 4;
    uint32 slot_count  = 5;
    uint32 num_members = 6;
}

message MatchingCallbackEntry {
    bool   enabled       = 1;
    uint64 callback_addr = 2;
    uint64 callback_arg  = 3;
}

// Room data structures

message MatchingRoomDataInternal {
    uint32                   public_slots       = 1;
    uint32                   private_slots      = 2;
    uint32                   open_public_slots  = 3;
    uint32                   open_private_slots = 4;
    uint32                   max_slot           = 5;
    uint32                   server_id          = 6;
    uint32                   world_id           = 7;
    uint32                   lobby_id           = 8;
    uint64                   room_id            = 9;
    uint64                   passwd_slot_mask   = 10;
    uint32                   joined_slot_mask   = 11;
    repeated MatchingRoomGroup groups           = 12;
    uint32                   flags              = 13;
    repeated MatchingBinAttr bin_attrs_internal = 14;
}

message MatchingRoomMemberData {
    string                   npid               = 1;
    uint32                   member_id          = 2;
    uint32                   team_id            = 3;
    bool                     is_owner           = 4;
    MatchingRoomGroup        group              = 5;
    repeated MatchingBinAttr bin_attrs_internal = 6;
}

message MatchingRoomDataExternal {
    uint32                       max_slot                  = 1;
    uint32                       cur_members               = 2;
    uint32                       flags                     = 3;
    uint32                       server_id                 = 4;
    uint32                       world_id                  = 5;
    uint64                       lobby_id                  = 6;
    uint64                       room_id                   = 7;
    uint64                       passwd_slot_mask          = 8;
    uint64                       joined_slot_mask          = 9;
    uint32                       public_slots              = 10;
    uint32                       private_slots             = 11;
    uint32                       open_public_slots         = 12;
    uint32                       open_private_slots        = 13;
    repeated MatchingRoomGroup   groups                    = 14;
    repeated MatchingIntAttr     external_search_int_attrs = 15;
    repeated MatchingBinAttr     external_search_bin_attrs = 16;
    repeated MatchingBinAttr     external_bin_attrs        = 17;
    string                       owner_npid                = 18;
}

message CreateJoinRoomResponse {
    MatchingRoomDataInternal        room_data       = 1;
    repeated MatchingRoomMemberData members         = 2;
    uint32                          me_member_id    = 3;
    uint32                          owner_member_id = 4;
}

// Command requests

message RegisterHandlersRequest {
    string addr          = 1;
    uint32 port          = 2;
    uint32 ctx_id        = 3;
    uint32 service_label = 4;
    repeated MatchingCallbackEntry callbacks = 5;
}

message CreateRoomRequest {
    uint32 req_id                  = 1;
    uint32 max_slots               = 2;
    uint32 team_id                 = 3;
    uint32 world_id                = 4;
    uint32 lobby_id                = 5;
    uint32 flags                   = 6;
    uint32 group_config_count      = 7;
    uint32 allowed_user_count      = 8;
    uint32 blocked_user_count      = 9;
    uint32 internal_bin_attr_count = 10;
    repeated MatchingIntAttr external_search_int_attrs = 11;
    repeated MatchingBinAttr external_search_bin_attrs = 12;
    repeated MatchingBinAttr external_bin_attrs        = 13;
    repeated MatchingBinAttr member_bin_attrs          = 14;
    bool   join_group_label_present = 15;
    bool   room_password_present    = 16;
    uint32 sig_type                 = 17;
    uint32 sig_flag                 = 18;
    uint32 sig_main_member          = 19;
}

message JoinRoomRequest {
    uint64 room_id              = 1;
    uint32 req_id               = 2;
    uint32 team_id              = 3;
    uint32 join_flags           = 4;
    uint32 blocked_user_count   = 5;
    repeated MatchingBinAttr member_bin_attrs   = 6;
    bool   room_password_present    = 7;
    bool   join_group_label_present = 8;
}

message LeaveRoomRequest {
    uint64 room_id = 1;
    uint32 req_id  = 2;
}

message RequestSignalingInfosRequest {
    string target_npid = 1;
}

message SetRoomDataInternalRequest {
    uint32 req_id           = 1;
    uint64 room_id          = 2;
    uint32 flag_filter      = 3;
    uint32 flag_attr        = 4;
    repeated MatchingBinAttr bin_attrs = 5;
    bool   has_passwd_mask  = 6;
    uint64 passwd_slot_mask = 7;
}

message SetRoomDataExternalRequest {
    uint32 req_id  = 1;
    uint64 room_id = 2;
    repeated MatchingIntAttr search_int_attrs = 3;
    repeated MatchingBinAttr search_bin_attrs = 4;
    repeated MatchingBinAttr ext_bin_attrs    = 5;
}

message KickoutRoomMemberRequest {
    uint64 room_id          = 1;
    uint32 req_id           = 2;
    uint32 target_member_id = 3;
    uint32 block_kick_flag  = 4;
}

// Command replies

message CreateRoomReply {
    uint64 room_id     = 1;
    uint32 server_id   = 2;
    uint32 world_id    = 3;
    uint32 lobby_id    = 4;
    uint32 member_id   = 5;
    uint32 max_slots   = 6;
    uint32 flags       = 7;
    uint32 cur_members = 8;
    CreateJoinRoomResponse details = 9;
}

message JoinRoomReply {
    uint64 room_id     = 1;
    uint32 member_id   = 2;
    uint32 max_slots   = 3;
    uint32 flags       = 4;
    uint32 cur_members = 5;
    CreateJoinRoomResponse details = 6;
}

message GetRoomListReply {
    repeated MatchingRoomDataExternal rooms = 1;
}

message RequestSignalingInfosReply {
    string target_npid      = 1;
    string target_ip        = 2;
    uint32 target_port      = 3;
    uint32 target_member_id = 4;
}

message LeaveRoomReply           { uint64 room_id = 1; }
message SetRoomDataInternalReply { uint64 room_id = 1; }
message SetRoomDataExternalReply { uint64 room_id = 1; }
message KickoutRoomMemberReply   { uint64 room_id = 1; }

// Notification payloads
// Every notification carries ctx_id so the client can route it to the owning
// context (the server tracks ctx_id per connection from RegisterHandlersRequest).

// NotificationType::RequestEvent (9)
message NotifyRequestEvent {
    uint32 ctx_id        = 1;
    uint32 server_id     = 2;
    uint32 world_id      = 3;
    uint32 lobby_id      = 4;
    uint32 req_event     = 5;
    uint32 req_id        = 6;
    uint32 error_code    = 7;
    uint64 room_id       = 8;
    uint32 member_id     = 9;
    uint32 max_slots     = 10;
    uint32 flags         = 11;
    bool   is_owner      = 12;
    bytes  response_blob = 13;
}

// NotificationType::MemberJoined (10)
message NotifyMemberJoined {
    uint64                   room_id   = 1;
    uint32                   member_id = 2;
    string                   npid      = 3;
    string                   addr      = 4;
    uint32                   port      = 5;
    repeated MatchingBinAttr bin_attrs = 6;
    uint32                   ctx_id    = 7;
}

// NotificationType::MemberLeft (11)
message NotifyMemberLeft {
    uint64 room_id   = 1;
    uint32 member_id = 2;
    string npid      = 3;
    uint32 ctx_id    = 4;
}

// NotificationType::SignalingHelper (12)
message NotifySignalingHelper {
    string npid      = 1;
    uint32 member_id = 2;
    string addr      = 3;
    uint32 port      = 4;
    uint32 ctx_id    = 5;
}

// NotificationType::SignalingEvent (13)
message NotifySignalingEvent {
    uint32 event_type = 1;
    uint64 room_id    = 2;
    uint32 member_id  = 3;
    uint32 conn_id    = 4;
    uint32 ctx_id     = 5;
}

// NotificationType::RoomDataInternalUpdated (15)
message NotifyRoomDataInternalUpdated {
    uint64                   room_id   = 1;
    uint32                   flags     = 2;
    repeated MatchingBinAttr bin_attrs = 3;
    uint32                   ctx_id    = 4;
}

// NotificationType::KickedOut (16)
message NotifyKickedOut {
    uint64 room_id     = 1;
    int32  status_code = 2;
    uint32 guard_value = 3;
    uint32 ctx_id      = 4;
}
