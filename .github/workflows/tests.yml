name: Run Tests

on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main]
  workflow_dispatch:

jobs:
  test:
    name: Run C++ Tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            compiler_cxx: clang-cl
            compiler_c: clang-cl
          - os: ubuntu-latest
            compiler_cxx: clang++
            compiler_c: clang
          - os: macos-latest
            compiler_cxx: clang++
            compiler_c: clang
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Setup CMake
        uses: lukka/get-cmake@latest
        
      - name: Setup Visual Studio shell (Windows only)
        if: runner.os == 'Windows'
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64
          
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja
          
      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_CXX_COMPILER="${{ matrix.compiler_cxx }}" \
            -DCMAKE_C_COMPILER="${{ matrix.compiler_c }}" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON
        shell: bash
        
      - name: Build all tests
        run: cmake --build build --config Debug
        shell: bash
        
      - name: Run tests with CTest
        working-directory: build
        run: ctest -C Debug --output-on-failure --progress
        shell: bash